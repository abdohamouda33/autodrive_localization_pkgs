particle_filter:
  ros__parameters:
    scan_topic: '/autodrive/roboracer_1/lidar'
    odometry_topic: '/odom_rf2o'
    base_frame: 'roboracer_1'
    odom_frame: 'odom'
    map_frame: 'map'
    angle_step: 18
    max_particles: 4000
    squash_factor: 2.2
    viz: 1
    max_viz_particles: 60
    range_method: 'cddt'
    theta_discretization: 112
    max_range: 10
    fine_timing: 0
    publish_odom: 1
    z_short: 0.01
    z_max: 0.07
    z_rand: 0.12
    z_hit: 0.75
    sigma_hit: 8.0
    motion_dispersion_x: 0.05
    motion_dispersion_y: 0.025
    motion_dispersion_theta: 0.25
    rangelib_variant: 2
    initial_pose_x: 0.75
    initial_pose_y: 7.66
    initial_pose_yaw: -1.5708  # الزاوية -90 درجة بالراديان (جنوب)

map_server:
  ros__parameters:
    map: 'levine'

